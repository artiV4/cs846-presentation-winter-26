name: problem_b coverage gate

on:
  push:
    branches:
      - problem_b
      - feat-user-helper
    paths:
      - 'problem_b/**'
      - '.github/workflows/problem_b_coverage.yml'

jobs:
  tests-and-coverage:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: problem_b

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with coverage threshold
        run: |
          python -m pytest \
            --cov=auth \
            --cov=main \
            --cov=database \
            --cov=seed \
            --cov-report=term-missing \
            --cov-fail-under=70
